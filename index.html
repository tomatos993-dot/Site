<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>catolion</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: #121212;
            color: white;
            cursor: pointer;
            overflow: hidden;
            font-family: Arial, sans-serif;
            user-select: none;
        }

        #texto-clique {
            font-size: 80px;
            font-weight: bold;
            color: #8A2BE2;
            margin-bottom: 20px;
        }

        #contador {
            font-size: 48px;
        }

        .pulsar {
            animation: pulso 0.3s ease-out;
        }

        @keyframes pulso {
            0% { transform: scale(1); }
            40% { transform: scale(1.3); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>

    <div id="texto-clique">CLIQUE</div>
    <div id="contador">0</div>

    <script>
        let cliques = 0;
        const texto = document.getElementById('texto-clique');
        const display = document.getElementById('contador');

        document.body.addEventListener('click', () => {
            cliques++;
            display.innerText = cliques;

            texto.classList.remove('pulsar');
            display.classList.remove('pulsar');
            
            void texto.offsetWidth; 
            
            texto.classList.add('pulsar');
            display.classList.add('pulsar');
        });
    </script>
</body>
</html>

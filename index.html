<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Hacked</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#000;
    height:100vh;
    overflow:hidden;

    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;

    font-family:"Courier New", monospace;
}

/* IMAGEM (SEM GLOW, SEM EFEITO) */
.logo{
    width:500px;
    max-width:80%;
    animation:none;
}

/* TEXTO EMBAIXO */
.texto{
    position:absolute;
    bottom:40px;

    color:#fff;
    text-align:center;

    font-size:20px;
    letter-spacing:4px;

    text-transform:uppercase;
}

.texto span{
    color:red;
}

/* RESPONSIVO */
@media(max-width:700px){
    .logo{ width:280px; }
    .texto{ font-size:13px; padding:20px; }
}

</style>

</head>

<body>

<!-- IMAGEM CENTRAL -->
<img
class="logo"
src="https://i.pinimg.com/1200x/8c/10/23/8c1023de3131ef34243c08b9ebbbbf97.jpg"
alt="logo"
/>

<!-- TEXTO -->
<div class="texto">

    hack3d b1 <span>mudsk1pper</span><br><br>

    Os reptilianos existem

</div>

</body>
</html>
